name: Daily SDR Recommendations

on:
  schedule:
    - cron: "0 13 * * 1-5"
  workflow_dispatch:
    inputs:
      limit:
        description: "Top N recommendations to generate"
        required: false
        default: "10"

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run recommendation job
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          PROSPECTS_DB_ID: ${{ secrets.PROSPECTS_DB_ID }}
          ACTIVITY_DB_ID: ${{ secrets.ACTIVITY_DB_ID }}
          RECOMMENDATIONS_DB_ID: ${{ secrets.RECOMMENDATIONS_DB_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          TOP_N: ${{ github.event.inputs.limit || '10' }}
        run: python run_recommendations_job.py --limit "$TOP_N"
